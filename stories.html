  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

  header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);border-bottom:1px solid var(--border);padding:24px 40px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}

  .logo{display:flex;align-items:center;gap:12px}
  .logo-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}

  h1{font-size:1.35rem;font-weight:700;letter-spacing:-.02em}

  .subtitle{font-size:.75rem;color:var(--muted);margin-top:2px}
  .stats{display:flex;gap:20px;flex-wrap:wrap}
  .stat{text-align:center}
  .stat-n{font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1}
  .stat-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

  .controls{max-width:1400px;margin:20px auto 0;padding:0 40px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search-wrap{position:relative;flex:1;min-width:200px}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 14px 9px 36px;font-size:.85rem;outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem}
  .filter-group{display:flex;gap:5px;flex-wrap:wrap}
  .filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 13px;font-size:.76rem;cursor:pointer;transition:all .2s;white-space:nowrap}

  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
  .filter-btn.active-theme{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:700}

  .grid{max-width:1400px;margin:20px auto 40px;padding:0 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:12px;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .2s}
  .card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,194,255,.1)}
  .card:hover::before{opacity:1}
  .card.hidden{display:none}

  .customer{font-size:.95rem;font-weight:700}
  .sector-badge{font-size:.66rem;font-weight:700;padding:3px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}

  .sector-badge.defence{background:rgba(124,58,237,.12);color:#a78bfa;border:1px solid rgba(124,58,237,.25)}
  .sector-badge.pub{background:rgba(0,208,132,.12);color:var(--green);border:1px solid rgba(0,208,132,.25)}

  .note{font-size:.78rem;color:var(--muted);line-height:1.5;border-left:3px solid var(--border);padding-left:11px}

  .tag-sit{background:rgba(0,208,132,.1);color:var(--green);border-color:rgba(0,208,132,.25)}
  .tag-dash{background:rgba(0,194,255,.1);color:var(--accent);border-color:rgba(0,194,255,.25)}

  .tag-ground{background:rgba(124,58,237,.1);color:#c4b5fd;border-color:rgba(124,58,237,.25)}

  .date-info,.submitter{font-size:.7rem;color:var(--muted)}

  .no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}

  nav{background:#0d1117;border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;gap:4px;overflow-x:auto}
  nav a{color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:500;padding:12px 14px;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
  nav a:hover{color:var(--text)}

  .nav-logo{color:var(--accent);font-weight:800;font-size:.9rem;margin-right:12px;letter-spacing:-.02em;padding:12px 0;white-space:nowrap}

</style>

// ── Helpers ──────────────────────────────────────────────────────────────
function tagClass(t){
  if(t.includes("Alert Speed"))return"tag-alert";
  if(t.includes("Situational"))return"tag-sit";
  if(t.includes("Dashboard"))return"tag-dash";
  if(t.includes("Risk Assessment"))return"tag-risk";
  if(t.includes("Ground Truth"))return"tag-ground";
  if(t.includes("Executive"))return"tag-exec";
  if(t.includes("Travel"))return"tag-travel";
  return"tag-cs";
}
function sectorClass(s){return s==="Corp Sec"?"corp":s==="Defence"?"defence":"pub"}

function renderCard(s){
  const tags=s.themes.map(t=>`<span class="tag ${tagClass(t)}">${t}</span>`).join('');
  return`<div class="card" data-sector="${s.sector}" data-themes="${s.themes.join('|')}" data-search="${(s.customer+' '+s.quote+' '+s.note+' '+s.themes.join(' ')).toLowerCase()}">
    <div class="card-header"><div class="customer">${s.customer}</div><span class="sector-badge ${sectorClass(s.sector)}">${s.sector}</span></div>
    <div class="quote">${s.quote}</div>
    ${s.note?`<div class="note">💡 ${s.note}</div>`:''}
    <div class="tags">${tags}</div>
    <div class="card-footer"><span class="date-info">📅 ${s.date}</span><span class="submitter">via ${s.submitter}</span></div>
  </div>`;
}

const grid=document.getElementById('cardsGrid');
grid.innerHTML=stories.map(renderCard).join('');

// ── Filter state ──────────────────────────────────────────────────────────
let activeSector='all',activeTheme=null;

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  let vis=0;
  document.querySelectorAll('.card').forEach(c=>{
    const ok=(activeSector==='all'||c.dataset.sector===activeSector)&&
             (!activeTheme||c.dataset.themes.includes(activeTheme))&&
             (!q||c.dataset.search.includes(q));
    c.classList.toggle('hidden',!ok);
    if(ok)vis++;
  });
  document.getElementById('totalCount').textContent=vis;
  let nr=document.querySelector('.no-results');
  if(vis===0&&!nr){grid.insertAdjacentHTML('beforeend','<div class="no-results"><div style="font-size:2rem;margin-bottom:10px">🔍</div>No stories match your filters.</div>')}
  else if(nr)nr.style.display=vis===0?'block':'none';
}

document.getElementById('searchInput').addEventListener('input',applyFilters);

document.querySelectorAll('[data-sector]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeSector=btn.dataset.sector;
    document.querySelectorAll('[data-sector]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  });
});

document.querySelectorAll('[data-theme]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(activeTheme===btn.dataset.theme){activeTheme=null;btn.classList.remove('active-theme')}
    else{document.querySelectorAll('[data-theme]').forEach(b=>b.classList.remove('active-theme'));activeTheme=btn.dataset.theme;btn.classList.add('active-theme')}
    applyFilters();
  });
});
</script>
