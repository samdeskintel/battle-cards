<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f4f0;color:#1a1a18}
a{text-decoration:none}
.topnav{background:#0d1117;border-bottom:1px solid #30363d;padding:0 40px;display:flex;align-items:center;gap:4px;overflow-x:auto;position:sticky;top:0;z-index:100}
.topnav a{color:#8b949e;text-decoration:none;font-size:.8rem;font-weight:500;padding:12px 14px;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.topnav a:hover{color:#e6edf3}
.topnav a.active{color:#00c2ff;border-bottom-color:#00c2ff}
.nav-logo{color:#00c2ff;font-weight:800;font-size:.9rem;margin-right:12px;letter-spacing:-.02em;padding:12px 0;white-space:nowrap;flex-shrink:0}
.content{padding:2rem 1.5rem;max-width:1200px;margin:0 auto}
.header{margin-bottom:1.5rem}
.page-title{font-size:20px;font-weight:500;margin-bottom:.25rem}
.page-sub{font-size:13px;color:#888780}
.controls{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#888780;white-space:nowrap}
.filter-btn{padding:5px 12px;border:0.5px solid #b4b2a9;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#5f5e5a;transition:all .15s;font-family:inherit}
.filter-btn:hover{border-color:#5f5e5a;color:#1a1a18}
.filter-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.search-wrap{flex:1;min-width:200px}
input[type=search]{width:100%;padding:7px 12px;border:0.5px solid #b4b2a9;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a18;outline:none}
input[type=search]:focus{border-color:#5f5e5a}
.divider{height:0.5px;background:#d3d1c7;margin-bottom:1.25rem}
.count{font-size:12px;color:#888780;margin-bottom:1rem}
.count strong{color:#1a1a18}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s}
.card:hover{border-color:#5f5e5a}
.card-top{padding:1rem 1.25rem;border-bottom:0.5px solid #f1efe8;flex:1}
.card-title{font-size:14px;font-weight:500;color:#1a1a18;margin-bottom:.4rem;line-height:1.3}
.card-desc{font-size:12px;color:#5f5e5a;line-height:1.5;margin-bottom:.65rem}
.card-stat{font-size:12px;font-weight:500;color:#3b6d11;background:#eaf3de;padding:.3rem .65rem;border-radius:6px;display:inline-block;margin-bottom:.6rem}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;background:#f1efe8;color:#5f5e5a;border:0.5px solid #d3d1c7}
.tag-uc{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4}
.card-bottom{padding:.6rem 1.25rem;background:#faf9f7;display:flex;justify-content:space-between;align-items:center}
.card-region{font-size:11px;color:#888780}
.card-type{font-size:11px;font-weight:500;color:#5f5e5a}
.empty{text-align:center;padding:3rem;color:#888780;font-size:14px;grid-column:1/-1}
@media(max-width:600px){.grid{grid-template-columns:1fr}.controls{flex-direction:column;align-items:flex-start}.topnav{padding:0 14px}}
</style>
</head>

  {title:"Communications Cable Cut in Baltic Sea",desc:"Deep-sea communications cable between Finland and Germany cut — shutting down Finland's only communication link to the rest of Europe. Intentional damage confirmed.",stat:"Fast verified alerts · intentional damage identified",uc:["Supply Chain","National Defense"],type:["Infrastructure","Maritime"],region:"Europe"},

  {title:"Crash in Sonora, Mexico",desc:"Bus collision killed 10 and injured 20. Detected from Spanish-language sources 3+ hours before local media.",stat:"3hr 12min faster than local news · 5hr 20min faster than Reforma",uc:["Travel Risk","Supply Chain"],type:["Crash","Transport"],region:"Latin America"},
  {title:"Explosion in London — Elephant & Castle",desc:"Large fire and explosions at Elephant and Castle train station. samdesk alerted from Snapchat and Twitter chatter.",stat:"30 min faster than London Fire Brigade · 1hr 17min faster than Crisis24",uc:["Travel Risk","Physical Asset Protection"],type:["Explosion","Fire"],region:"Europe"},
  {title:"Plane Crash in California",desc:"Small plane crashed near high school in Santee, sparking fires and local lockdowns.",stat:"1hr 55min faster than Factal · 2hr 50min faster than CNN",uc:["Travel Risk","Physical Asset Protection"],type:["Crash","Aviation"],region:"North America"},
  {title:"Shooting in Vienna, Austria",desc:"Gunman attacked bars and restaurants in Vienna. samdesk alerted from German-language sources.",stat:"30 min faster than Factal · 44 min faster than Sky News",uc:["Travel Risk"],type:["Shooting","Terror"],region:"Europe"},

  {title:"Italian Ambassador Killed — DRC Congo",desc:"Italian ambassador killed in gun attack on UN convoy near Goma. samdesk provided immediate multilingual alert.",stat:"Industry-leading alert times · multilingual detection",uc:["Executive Protection","National Defense"],type:["Armed Attack","Shooting"],region:"Africa"},

  {title:"Dallas Ransomware Attack",desc:"City of Dallas servers compromised with ransomware. samdesk alerted from the first mention online and monitored until resolved.",stat:"Alerted from first mention online",uc:["Physical Asset Protection"],type:["Cyber Attack","Ransomware"],region:"North America"},
  {title:"Active Shooter — 1 Killed in Officer-Involved Shooting, Oregon",desc:"Armed carjacking in Salem, Oregon escalated to officer-involved shooting. samdesk alerted before Salem PD posted publicly.",stat:"29 min faster than Salem PD",uc:["Workplace Safety"],type:["Shooting"],region:"North America"},

const ucList=[...new Set(incidents.flatMap(i=>i.uc))].sort();
const typeList=[...new Set(incidents.flatMap(i=>i.type))].sort();
const regionList=[...new Set(incidents.map(i=>i.region))].sort();
let activeUC=[],activeType=[],activeRegion=[],searchVal='';

function makeFilters(list,container,toggle){
  const el=document.getElementById(container);
  list.forEach(f=>{
    const b=document.createElement('button');
    b.className='filter-btn';b.textContent=f;
    b.onclick=()=>{toggle(f,b);render();};
    el.appendChild(b);
  });
}
function toggleFilter(arr,val,btn){const i=arr.indexOf(val);if(i>-1){arr.splice(i,1);btn.classList.remove('active');}else{arr.push(val);btn.classList.add('active');}}
makeFilters(ucList,'uc-filters',(f,b)=>toggleFilter(activeUC,f,b));
makeFilters(typeList,'type-filters',(f,b)=>toggleFilter(activeType,f,b));
makeFilters(regionList,'region-filters',(f,b)=>toggleFilter(activeRegion,f,b));
document.getElementById('search').addEventListener('input',e=>{searchVal=e.target.value.toLowerCase();render();});

function render(){
  const filtered=incidents.filter(inc=>{
    const matchUC=activeUC.length===0||activeUC.some(u=>inc.uc.includes(u));
    const matchType=activeType.length===0||activeType.some(t=>inc.type.includes(t));
    const matchRegion=activeRegion.length===0||activeRegion.includes(inc.region);
    const matchSearch=!searchVal||(inc.title+inc.desc+inc.stat+inc.region+inc.uc.join()+inc.type.join()).toLowerCase().includes(searchVal);
    return matchUC&&matchType&&matchRegion&&matchSearch;
  });
  const grid=document.getElementById('grid');
  const count=document.getElementById('count');
  count.innerHTML=`Showing <strong>${filtered.length}</strong> of <strong>${incidents.length}</strong> examples`;
  grid.innerHTML='';
  if(filtered.length===0){grid.innerHTML='<div class="empty">No examples match your filters. Try removing a filter or clearing the search.</div>';return;}
  filtered.forEach(inc=>{
    const ucTags=inc.uc.map(u=>`<span class="tag tag-uc">${u}</span>`).join('');
    const typeTags=inc.type.map(t=>`<span class="tag">${t}</span>`).join('');
    const card=document.createElement('div');card.className='card';
    const ucHash={'Workplace Safety':'workplace','Physical Asset Protection':'physical','Travel Risk':'travel','Supply Chain':'supply','Executive Protection':'ep','National Defense':'defense'};
    const hash=ucHash[inc.uc[0]]||'';
    const link=hash?`use-cases.html#${hash}`:'use-cases.html';
    card.innerHTML=`<div class="card-top"><div class="card-title">${inc.title}</div><div class="card-desc">${inc.desc}</div><div class="card-stat">⚡ ${inc.stat}</div><div class="tags">${ucTags}${typeTags}</div></div><div class="card-bottom"><div class="card-region">${inc.region}</div><a href="${link}" style="font-size:11px;color:#185fa5;text-decoration:none;font-weight:500">View use case →</a></div>`;
    grid.appendChild(card);
  });
}
render();
</script>
