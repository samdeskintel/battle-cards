<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMDesk Use Case Conversation Guide</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--s2:#1c2230;--border:#30363d;--bl:#21262d;--accent:#00c2ff;--green:#00d084;--red:#ef4444;--orange:#f59e0b;--text:#e6edf3;--muted:#8b949e;--faint:#6e7681}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
.topnav{background:#0d1117;border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;gap:4px;overflow-x:auto;position:sticky;top:0;z-index:100}
.topnav a{color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:500;padding:12px 14px;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.topnav a:hover{color:var(--text)}
.topnav a.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-logo{color:var(--accent);font-weight:800;font-size:.9rem;margin-right:12px;letter-spacing:-.02em;padding:12px 0;white-space:nowrap;flex-shrink:0}
.content{padding:2rem 1.5rem;max-width:1200px;margin:0 auto}
.page-title{font-size:20px;font-weight:500;margin-bottom:.25rem}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.tab{padding:6px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s;font-family:inherit}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.pane{display:none}
.pane.active{display:block}
.section-label{font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:.75rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.25rem}
.card-pad{padding:1.25rem 1.5rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}

/* Incidents */
.incident{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.25rem}
.incident-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);background:var(--s2);border-top:2px solid var(--accent)}
.incident-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:.25rem}
.incident-tags{display:flex;gap:6px;flex-wrap:wrap}
.itag{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(0,194,255,.1);color:var(--accent);border:1px solid rgba(0,194,255,.2);font-weight:500}
.incident-body{padding:1.25rem 1.5rem}
.incident-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1rem}

/* ADAR */
.adar-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1rem}
.adar-phase{padding:.75rem 1rem;border-right:1px solid var(--border);background:var(--surface)}
.adar-phase:last-child{border-right:none}
.adar-letter{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:2px}
.adar-name{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.4rem}
.adar-text{font-size:12px;color:var(--muted);line-height:1.4}
.adar-stat{font-size:11px;font-weight:500;color:var(--green);margin-top:.3rem;padding:.2rem .5rem;background:rgba(0,208,132,.1);border:1px solid rgba(0,208,132,.2);border-radius:4px;display:inline-block}

/* Stats */
.stats{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.stat-pill{font-size:12px;padding:.3rem .75rem;border-radius:6px;background:var(--s2);border:1px solid var(--border);color:var(--text)}
.stat-pill strong{color:var(--green)}

/* Discovery / pitch */
.dq-list{display:flex;flex-direction:column;gap:.5rem}
.dq-item{display:flex;gap:.6rem;font-size:13px;color:var(--muted);line-height:1.5;align-items:flex-start}
.dq-num{min-width:20px;height:20px;border-radius:50%;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--faint);flex-shrink:0;margin-top:2px}
.pitch-step{display:flex;gap:.75rem;padding:.65rem 0;border-bottom:1px solid var(--bl);align-items:flex-start}
.pitch-step:last-child{border-bottom:none}
.pitch-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.pitch-text{font-size:13px;color:var(--text);line-height:1.5;flex:1}
.pitch-sub{font-size:12px;color:var(--muted);margin-top:2px}
.demo-item{display:flex;gap:.6rem;padding:.6rem 0;border-bottom:1px solid var(--bl);font-size:13px;align-items:flex-start}
.demo-item:last-child{border-bottom:none}
.demo-icon{color:var(--accent);flex-shrink:0;margin-top:1px}
.demo-text{color:var(--text);line-height:1.4;flex:1}
.demo-why{font-size:12px;color:var(--muted);margin-top:2px}
.obj-item{padding:.65rem 0;border-bottom:1px solid var(--bl)}
.obj-item:last-child{border-bottom:none}
.obj-q{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.obj-a{font-size:13px;color:var(--muted);line-height:1.55;padding-left:.75rem;border-left:2px solid var(--border)}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.adar-grid{grid-template-columns:1fr 1fr}.adar-phase:nth-child(2){border-right:none}.adar-phase:nth-child(3),.adar-phase:nth-child(4){border-top:1px solid var(--border)}.topnav{padding:0 14px}}
</style>
</head>

const useCases=[
{id:"workplace",label:"Workplace Safety",intro:"Security teams responsible for workplace safety need to detect threats in real time — active shooters, civil unrest, bomb threats — and get accurate information to the right people before situations escalate. The challenge is speed, accuracy, and organizational impact assessment simultaneously.",
incidents:[
{title:"Active Shooter in Lewiston, Maine",tags:["Active Shooter","Public Safety","Multi-location"],desc:"On October 25, an active shooter entered a local business in Lewiston and opened fire, killing 18 individuals. Initial reports were conflicting and hard to contextualize. samdesk's AI and human analysts quickly alerted and monitored, providing ongoing updates.",stats:["Online chatter: 19:19 EST","samdesk alert: 19:21 EST","4 analyst updates by 19:49","Factal alert: 19:49 EST — <strong>28 min behind</strong>"],adar:[{l:"A",n:"Anticipate",t:"Early online chatter detected at 19:19 — 2 min before alert issued. AI identified active shooter pattern from conflicting unverified signals."},{l:"D",n:"Detect",t:"Alert issued 19:21. Verified shooting with location update by 19:24. Other platforms issued first alert 28 minutes later.",s:"19:21 — 28 min ahead of Factal"},{l:"A",n:"Analyze",t:"4 official analyst updates tracking shooter locations, impacted areas, and police activity across multiple sites as situation evolved."},{l:"R",n:"Resolve",t:"Continuous monitoring through manhunt. Users received final all-clear with confirmed custody, enabling security teams to stand down with confidence."}]},
{title:"Boulder King Soopers Active Shooter",tags:["Active Shooter","Public Safety","Colorado"],desc:"On March 22, an active shooter at a Boulder King Soopers supermarket killed 10 people. samdesk produced an alert at 20:35 GMT, faster than all official sources and major media.",stats:["samdesk alert: 20:35 GMT","Boulder PD: <strong>14 min later</strong>","Factal: <strong>19 min later</strong>","CNN Breaking: <strong>1hr 4min later</strong>"],adar:[{l:"A",n:"Anticipate",t:"AI picked up scanner traffic and social chatter about emergency crews responding to King Soopers before any official communication."},{l:"D",n:"Detect",t:"Alert issued 20:35 from early social signal. Verified and upgraded within minutes. Police didn't post publicly until 20:49.",s:"14 min faster than police"},{l:"A",n:"Analyze",t:"Geo-precise location mapping allowed security teams to determine proximity to facilities, travelers, and employees in Boulder area."},{l:"R",n:"Resolve",t:"Continuous monitoring provided updates on casualty counts, suspect status, and area closures enabling coordinated organizational response."}]}
],
discovery:["Walk me through what happens in your organization when an active threat is detected near one of your facilities — who gets notified and how?","How does your team currently distinguish a real active threat from a false alarm before escalating to leadership?","When an incident occurs, how long does it typically take to determine whether your employees are in the affected area?","How confident is your security team in the accuracy of the alerts they're acting on today?","If an incident happens at 2am in a city where you have staff, what does your response look like without someone watching a dashboard?"],
pitch:[{n:1,t:"Open with the problem",s:"Most workplace security teams are managing alerts reactively — they find out the same time as the public, or later. The risk window is between when something happens and when your team has enough confidence to act."},{n:2,t:"Introduce the speed advantage",s:"samdesk consistently alerts 15–60 minutes before official sources and major media. In a workplace safety context, those minutes determine whether your team can influence outcome or only document it."},{n:3,t:"Show the verification story",s:"Speed without accuracy creates panic. samdesk's AI + analyst model means alerts are verified before they reach your team. Show the Lewiston timeline — 4 analyst updates before Factal issued its first alert."},{n:4,t:"Connect to org impact",s:"The question isn't just 'did we know about it' — it's 'did we know which of our people were affected.' samdesk maps events to your employee and facility footprint automatically."},{n:5,t:"Paint the agentic future",s:"Today samdesk speeds up your team. Tomorrow, Impact Agents can trigger notifications, route employees, and brief security leadership autonomously the moment a threshold is crossed."}],
demo:[{i:"→",t:"Show a real event detection in the samdesk platform",w:"Start with the Lewiston or Boulder event — walk through how the alert appeared before official sources, with verified context."},{i:"→",t:"Show geo-precision and proximity analysis",w:"Demonstrate how the platform maps an incident to a facility radius — 'here are the employees within 2 miles of this event.'"},{i:"→",t:"Show the incident window consolidation",w:"One view with all updates, visuals, and context — not 10 separate alerts. This is the time-saving story."},{i:"→",t:"Show an Impact Agent in action",w:"Demonstrate autonomous analysis: 'the system detected, verified, and identified impact without anyone logging in.'"}],
objections:[{q:`"We already have an alert tool for this."`,a:`"That's exactly what we hear most. The question is whether your current tool is telling you before or after your employees already know — and whether it's telling you which of your specific people are affected, or just that something happened nearby. Those are different problems."`},{q:`"We have a security team monitoring this."`,a:`"Great — samdesk makes that team dramatically more effective. Instead of monitoring dashboards and validating alerts, they're spending time on decisions. Our customers consistently report their analysts shift from triage work to strategic response."`},{q:`"False positives are our biggest problem."`,a:`"That's the most common complaint we hear about first-generation alert tools. samdesk's viability attestation and AI + human verification model means your team only sees what's real. The Lewiston case is a perfect example — conflicting reports, but samdesk had verified context while others were still uncertain."`}]},

{id:"physical",label:"Physical Asset Protection",intro:"Physical security teams protecting facilities, infrastructure, and assets need early warning of threats — not just active events, but approaching risks. From cyberattacks that affect physical operations to natural disasters to infrastructure incidents, the challenge is knowing before it's too late to act.",
incidents:[
{title:"Cyber Attack Targets MGM Resorts",tags:["Cyber Attack","Network Outage","Las Vegas"],desc:"On September 11, 2023, samdesk's AI detected anomalies indicating a network outage disrupting operations at MGM Grand in Las Vegas. The platform quickly corroborated that the outage was the result of a cyberattack — hours before the company acknowledged it publicly.",stats:["samdesk alert: 11:31 PDT","Local media: <strong>6hr 44min later</strong>","MGM Resorts: <strong>11hr 24min later</strong>","Monitored for <strong>16+ hours</strong>"],adar:[{l:"A",n:"Anticipate",t:"AI detected early anomaly signals indicating a network disruption at a major property. Recognized the pattern as consistent with a cyberattack before any confirmation.",s:"Detected before any public signal"},{l:"D",n:"Detect",t:"Alert issued 11:31 PDT. Team corroborated within minutes that the network outage was the result of a cyber attack — not a routine outage.",s:"6hr 44min faster than media"},{l:"A",n:"Analyze",t:"Continuous updates over 16 hours clarified scope — which systems were affected, which properties, and the nature of the attack for security and operations teams."},{l:"R",n:"Resolve",t:"Users received a consolidated, evolving picture of what was happening and the organizational impact — enabling security and IT teams to make informed decisions throughout."}]},
{title:"Japan Earthquake & Tsunami",tags:["Earthquake","Tsunami","Natural Disaster","Japan"],desc:"On January 1, 2024, our AI picked up the first chatter about an earthquake warning in Ishikawa Prefecture, Japan. samdesk alerted to the incoming tsunami 18 minutes before it occurred — and 24 minutes before Japan's national broadcaster.",stats:["Tsunami warning: <strong>18 min before impact</strong>","Japan broadcaster: <strong>24 min behind</strong>","14 updates over 7 hours","Infrastructure disruptions mapped across multiple locations"],adar:[{l:"A",n:"Anticipate",t:"AI detected first earthquake chatter from local Japanese sources. System identified escalating seismic pattern and issued early warning before official communications.",s:"Anticipate phase: before national broadcaster"},{l:"D",n:"Detect",t:"Tsunami warning issued 18 minutes before the wave hit. Safety alerts and infrastructure disruption reports monitored across multiple locations in real time.",s:"18 min tsunami advance warning"},{l:"A",n:"Analyze",t:"Analysts monitored local sources to identify ongoing safety and infrastructure disruptions — power outages, road closures, facility damage — across the affected region."},{l:"R",n:"Resolve",t:"14 updates over 7 hours provided a continuously evolving picture of the situation, enabling organizations to track the safety of employees and assets across the region."}]}
],
discovery:["When a critical incident occurs near one of your facilities — a cyberattack, natural disaster, or physical threat — how does your team find out, and how quickly?","How do you currently monitor for threats to your physical assets in regions where you don't have dedicated security staff?","In the last major incident affecting one of your facilities, how much time passed between the event and your team having full situational awareness?","How does your team differentiate between an incident that requires evacuation versus one that requires monitoring only?","If a cyberattack or infrastructure failure hit one of your facilities right now, what's your current detection and response timeline?"],
pitch:[{n:1,t:"Start with the detection gap",s:"Most physical security programs have strong response protocols — the gap is in early detection. By the time an incident appears in official channels, your window to protect assets has often already narrowed."},{n:2,t:"Anchor on the MGM story",s:"11 hours 24 minutes. That's how long it took MGM to publicly acknowledge a cyberattack that samdesk detected in minutes. For organizations with physical assets dependent on digital infrastructure, that gap is catastrophic."},{n:3,t:"Use the tsunami story for natural disaster context",s:"18 minutes of advance warning before a tsunami. That's the difference between evacuation and exposure. For organizations with assets in high-risk regions, this is the anticipate phase working at full capability."},{n:4,t:"Connect to asset-specific impact",s:"samdesk doesn't just detect the event — it maps it to your specific footprint. Which facilities are in the impact radius, which systems are at risk, which personnel need to be contacted."},{n:5,t:"Show the agentic direction",s:"The future state is Impact Agents that monitor your asset footprint 24/7, detect relevant threats automatically, and trigger your response protocols without waiting for a human to log in."}],
demo:[{i:"→",t:"Show the MGM cyber detection",w:"Walk through how samdesk detected anomalies consistent with a cyber attack hours before any public acknowledgment."},{i:"→",t:"Show natural disaster early warning capability",w:"Use the Japan earthquake/tsunami as a proof point — the system detected before national broadcasters and issued tsunami warning 18 min ahead of impact."},{i:"→",t:"Show facility proximity mapping",w:"Demonstrate how an event is automatically mapped to nearby facilities and assets."},{i:"→",t:"Show continuous update consolidation",w:"One incident window that evolves over hours — not dozens of separate alerts."}],
objections:[{q:`"We have building security and physical monitoring systems already."`,a:`"Absolutely — and those are essential for what's happening inside your facilities. samdesk monitors for what's happening outside and approaching: the cyber threat on its way in, the natural disaster heading toward your region, the civil unrest developing near your facility."`},{q:`"We use a cyber threat intelligence platform for cyber incidents."`,a:`"Those tools are great for known threat actors and vulnerability monitoring. samdesk catches something different — the operational signal that a cyberattack is happening right now, from social and open-source chatter, before any official disclosure. The MGM case is a perfect example: 11 hours before the company told anyone."`},{q:`"Natural disasters are handled by our business continuity plan."`,a:`"A BC plan tells you what to do after. samdesk tells you 18 minutes before the tsunami hits — which is when your BC plan actually becomes executable. Early warning is what gives your plan time to work."`}]},

{id:"travel",label:"Travel Risk Management",intro:"Travel risk programs are responsible for knowing where employees are traveling, what risks they face, and ensuring duty of care when situations develop. The challenge is getting real-time, traveler-specific intelligence — not generic country-level risk scores — fast enough to influence outcome.",
incidents:[
{title:"Public Disorder at Charles de Gaulle Airport, Paris",tags:["Civil Unrest","Airport","Travel Disruption","French-language"],desc:"On July 2, airport employees protesting pay cuts blocked a terminal and delayed flights at Charles de Gaulle Airport. samdesk detected the disruption from French-language social chatter — before any English media had the story.",stats:["samdesk alert: 10:29 GMT","BFM TV (French news): <strong>21 min later</strong>","Le Point: <strong>1hr 22min later</strong>","Irish Examiner: <strong>1hr 40min later</strong>"],adar:[{l:"A",n:"Anticipate",t:"AI detected early French-language chatter on Twitter about a strike at Roissy/Terminal 2E — before any official airport communication or English-language media.",s:"French-language detection: 21 min ahead of BFM TV"},{l:"D",n:"Detect",t:"Alert issued 10:29 GMT with terminal-specific location. Travelers in transit or about to depart had over an hour before mainstream media reported the disruption."},{l:"A",n:"Analyze",t:"Flight delay scope confirmed and updated as situation evolved. Travel risk teams could identify which travelers had flights through Terminal 2E and proactively contact them."},{l:"R",n:"Resolve",t:"Continuous updates through resolution — enabling travel managers to rebook affected travelers, issue pre-departure warnings, and track situation status in real time."}]},
{title:"Japan Earthquake & Tsunami — Traveler Safety",tags:["Earthquake","Tsunami","Japan","Traveler Safety"],desc:"The January 1, 2024 Ishikawa earthquake and tsunami created immediate risk for travelers in the region. samdesk's 18-minute advance tsunami warning and 7 hours of continuous updates gave travel risk teams the window to locate, warn, and guide travelers before the situation became critical.",stats:["Tsunami warning: <strong>18 min before impact</strong>","24 min ahead of national broadcaster","14 updates over 7 hours","Infrastructure disruptions tracked across multiple locations"],adar:[{l:"A",n:"Anticipate",t:"Earthquake detected from first local chatter. System escalated alert pattern as seismic data corroborated reports.",s:"Ahead of national broadcaster"},{l:"D",n:"Detect",t:"Tsunami warning issued 18 minutes before impact. Travel risk teams had a window to identify travelers in the coastal impact zone.",s:"18 min advance tsunami warning"},{l:"A",n:"Analyze",t:"Infrastructure disruptions mapped — airports, roads, ports — enabling travel managers to understand evacuation options."},{l:"R",n:"Resolve",t:"7 hours of continuous updates tracked the evolving situation, giving travel risk teams a sustained, reliable picture as the crisis unfolded."}]}
],
discovery:["When a situation develops in a city where you have travelers — civil unrest, natural disaster, security incident — how does your travel risk team find out, and how quickly can you locate and contact affected travelers?","How does your current travel risk program handle incidents that develop overnight in a non-English speaking country?","If one of your travelers was in a terminal at CDG when a strike began, how long would it take your team to know about it and reach them?","How do you distinguish a country-level risk advisory from a specific, localized incident that requires immediate traveler action?","What does your duty of care obligation look like when an incident happens — and what's the standard you'd be held to if something went wrong?"],
pitch:[{n:1,t:"Frame the duty of care obligation",s:"Travel risk isn't just about alerts — it's about demonstrable duty of care. The standard organizations are held to is whether they knew about the risk early enough to act."},{n:2,t:"Use CDG as the multilingual detection story",s:"A strike at Charles de Gaulle was detectable from French-language chatter 21 minutes before French national news reported it. Most travel risk tools miss non-English signals entirely."},{n:3,t:"Use Japan as the anticipate story",s:"18 minutes before a tsunami hits is a window. It's the difference between a travel manager seeing the alert and reaching their traveler, versus finding out at the same time as the news."},{n:4,t:"Connect to traveler-specific impact",s:"Country risk scores don't tell you which of your travelers is in Terminal 2E. samdesk maps live events to your traveler roster automatically."},{n:5,t:"Close on the proactive vs. reactive divide",s:"ISOS, crisis response services, and notification platforms all operate after the fact. samdesk is what gets your travelers into the evacuation queue before the situation becomes a crisis."}],
demo:[{i:"→",t:"Show a travel disruption detection — CDG airport",w:"Walk through the strike detection from French-language sources. Emphasize the multilingual capability and the 21-minute lead over French national media."},{i:"→",t:"Show traveler proximity mapping",w:"Demonstrate how samdesk maps a live event to a traveler roster — 'these 3 travelers have flights through Terminal 2E in the next 4 hours.'"},{i:"→",t:"Show a pre-travel brief example",w:"Walk through the pre-trip intelligence report — country risk, current event context, and specific alerts relevant to the destination."},{i:"→",t:"Show the Japan tsunami timeline",w:"The 18-minute advance warning is visceral. Walk through the timeline — first chatter, alert, tsunami warning, and the gap vs. national broadcaster."}],
objections:[{q:`"We use International SOS for travel risk."`,a:`"ISOS is excellent at getting people out after an incident. The question is whether you want to be calling them for an evacuation, or whether samdesk's early warning meant your traveler was on the last flight out before the airport closed."`},{q:`"We have country risk ratings and pre-travel briefings covered."`,a:`"Country ratings tell you the background risk level. They don't tell you about the strike that started this morning at the airport your traveler is flying through tonight. samdesk is the real-time operational layer on top of your strategic risk assessments."`},{q:`"Our travelers are mostly in low-risk countries."`,a:`"The CDG incident happened in France. The Nashville explosion happened in the US. The MGM cyber attack was Las Vegas. Risk doesn't only live in high-threat-rated countries."`}]},

{id:"supply",label:"Supply Chain & Logistics",intro:"Supply chain risk managers need to detect disruptions before they cascade — port closures, route interruptions, political instability, infrastructure failures. The window between a disruption occurring and it affecting your logistics is often hours or days, and early intelligence is the only way to stay ahead of it.",
incidents:[
{title:"Crimea Bridge Explosion",tags:["Explosion","Infrastructure","Disinformation","Supply Route"],desc:"An explosion occurred on the only bridge connecting Crimea with Russia — a critical supply route for the Ukraine invasion. Russia immediately claimed the damage was minimal. samdesk users had visual confirmation within minutes that a portion of the bridge had collapsed into the water.",stats:["Immediate visual confirmation of collapse","Russia's claim of minimal damage: <strong>disproven in real time</strong>","Supply route impact understood instantly","Bridge repairs ongoing <strong>6+ months</strong> later"],adar:[{l:"A",n:"Anticipate",t:"samdesk's monitoring of Ukraine conflict signals provided context for the strategic importance of this supply route.",s:"26,324 Ukraine events tracked in 18 months"},{l:"D",n:"Detect",t:"Explosion detected immediately. Visual media pulled into the alert confirmed the scale of the collapse — contradicting Russian official claims within minutes."},{l:"A",n:"Analyze",t:"Supply chain teams could immediately assess impact: the primary land supply route to Crimea was compromised, affecting logistics for months.",s:"Route disruption confirmed, not minimized"},{l:"R",n:"Resolve",t:"Continuous monitoring tracked bridge repair progress over months, giving supply chain planners an ongoing picture of route availability."}]},
{title:"Southwest Airlines Network Outage",tags:["Network Outage","Aviation","Supply Chain","Operations"],desc:"Southwest Airlines flights across the U.S. were grounded due to a network outage. samdesk users were able to quickly determine the cause — and scope — of the flight disruptions, while media was still speculating.",stats:["samdesk alert: <strong>1hr 18min faster than media</strong>","Scope of disruption confirmed early","Consolidated updates as info emerged","Continuous updates until incident resolved"],adar:[{l:"A",n:"Anticipate",t:"AI detected early anomaly signals of flight disruptions at Southwest. Pattern recognition distinguished a systemic outage from routine weather-related delays.",s:"Systemic vs. isolated: identified early"},{l:"D",n:"Detect",t:"Alert issued 1 hour 18 minutes before media reported the story. Supply chain teams had early warning to begin contingency planning.",s:"1hr 18min faster than media"},{l:"A",n:"Analyze",t:"Consolidated updates confirmed the scope — all Southwest flights, not just a regional disruption. Supply chain teams could immediately assess full operational impact."},{l:"R",n:"Resolve",t:"Continuous updates tracked the outage resolution, enabling teams to time contingency logistics against actual system recovery."}]}
],

const tabsEl=document.getElementById('tabs'),panesEl=document.getElementById('panes');
useCases.forEach((uc,i)=>{
  const t=document.createElement('button');
  t.className='tab'+(i===0?' active':'');t.textContent=uc.label;
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('pane-'+uc.id).classList.add('active');};
  tabsEl.appendChild(t);

  const incHtml=uc.incidents.map(inc=>{
    const statsHtml=inc.stats.map(s=>`<div class="stat-pill">${s}</div>`).join('');
    const adarHtml=inc.adar.map(a=>`<div class="adar-phase"><div class="adar-letter">${a.l}</div><div class="adar-name">${a.n}</div><div class="adar-text">${a.t}</div>${a.s?`<div class="adar-stat">${a.s}</div>`:''}</div>`).join('');
    const tagsHtml=inc.tags.map(t=>`<span class="itag">${t}</span>`).join('');
    return`<div class="incident"><div class="incident-header"><div class="incident-title">${inc.title}</div><div class="incident-tags">${tagsHtml}</div></div><div class="incident-body"><div class="incident-desc">${inc.desc}</div><div class="stats">${statsHtml}</div><div class="section-label">ADAR breakdown</div><div class="adar-grid">${adarHtml}</div></div></div>`;
  }).join('');

  const dqHtml=uc.discovery.map((q,n)=>`<div class="dq-item"><div class="dq-num">${n+1}</div><div>${q}</div></div>`).join('');
  const pitchHtml=uc.pitch.map(p=>`<div class="pitch-step"><div class="pitch-num">${p.n}</div><div><div class="pitch-text">${p.t}</div><div class="pitch-sub">${p.s}</div></div></div>`).join('');
  const demoHtml=uc.demo.map(d=>`<div class="demo-item"><div class="demo-icon">${d.i}</div><div><div class="demo-text">${d.t}</div><div class="demo-why">${d.w}</div></div></div>`).join('');
  const objHtml=uc.objections.map(o=>`<div class="obj-item"><div class="obj-q">${o.q}</div><div class="obj-a">${o.a}</div></div>`).join('');

  const pane=document.createElement('div');
  pane.className='pane'+(i===0?' active':'');pane.id='pane-'+uc.id;
  pane.innerHTML=`
    <div class="card card-pad" style="margin-bottom:1.25rem;border-left:3px solid var(--accent)">
      <div style="font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--accent);text-transform:uppercase;margin-bottom:.4rem">Use case overview</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.6">${uc.intro}</div>
    </div>
    <div class="section-label">Real-world examples</div>${incHtml}
    <div class="two-col">
      <div><div class="section-label">Discovery script</div><div class="card card-pad"><div class="dq-list">${dqHtml}</div></div></div>
      <div><div class="section-label">Pitch flow</div><div class="card card-pad">${pitchHtml}</div></div>
    </div>
    <div class="two-col">
      <div><div class="section-label">Demo guide</div><div class="card card-pad">${demoHtml}</div></div>
      <div><div class="section-label">Key objections</div><div class="card card-pad">${objHtml}</div></div>
    </div>`;
  panesEl.appendChild(pane);
});

window.addEventListener('DOMContentLoaded',()=>{
  const hash=window.location.hash.replace('#','');
  if(hash){
    const idx=useCases.findIndex(u=>u.id===hash);
    if(idx>-1){
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.tab')[idx].classList.add('active');
      const target=document.getElementById('pane-'+hash);
      if(target)target.classList.add('active');
    }
  }
});
</script>
