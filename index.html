const tabsEl=document.getElementById('tabs'),cardsEl=document.getElementById('cards');
competitors.forEach((c,i)=>{
  const t=document.createElement('button');
  t.className='tab'+(i===0?' active':'');t.textContent=c.name;
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('card-'+i).classList.add('active');};
  tabsEl.appendChild(t);
  const snapHtml=Object.entries(c.snap).map(([k,v])=>`<div class="snap-item"><strong>${v}</strong>${k}</div>`).join('');
  const lmHtml=c.landmines.map(l=>`<div class="lm-item"><strong>${l.q}</strong>${l.a}</div>`).join('');
  const objHtml=c.objections.map(o=>`<div class="obj-item"><div class="obj-q">${o.q}</div><div class="obj-a">${o.a}</div></div>`).join('');
  const discHtml=c.discovery.map((d,n)=>`<div class="disc-item"><div class="disc-num">${n+1}</div><div>${d}</div></div>`).join('');
  const winRows=c.wins.map(([label,them,us])=>`<div class="win-row"><span class="win-label">${label}</span><span class="win-them">${them}</span><span class="win-us">${us}</span></div>`).join('');
  const nbHtml=c.killNB?`<div class="kill-nb">${c.killNB}</div>`:'';
  const intelHtml=c.intel?`<div class="intel-alert"><div class="intel-alert-inner"><div class="intel-tag">🚨 Latest Intel · ${c.intel.date}</div><div class="intel-body">${c.intel.body}</div><div class="intel-counter"><strong style="color:var(--text)">Counter:</strong> ${c.intel.counter}</div></div></div>`:'';
  const card=document.createElement('div');card.className='card'+(i===0?' active':'');card.id='card-'+i;
  card.innerHTML=`<div class="card-header"><div><div class="comp-name">${c.name}</div><div class="comp-type">${c.type}</div></div><div class="snapshot">${snapHtml}</div></div>${intelHtml}<div class="kill-shot"><div class="kill-label">Kill shot</div><blockquote>${c.killShot}</blockquote>${nbHtml}</div><div class="grid"><div class="section"><div class="section-label">Landmines to lay</div><div class="landmine">${lmHtml}</div></div><div class="section section-right"><div class="section-label">Objection handling</div>${objHtml}</div></div><div class="grid"><div class="section"><div class="section-label">Discovery questions</div><div class="disc-list">${discHtml}</div></div><div class="section section-right"><div class="section-label">Head to head</div><div class="win-header"><span style="flex:1">Dimension</span><span style="width:60px;text-align:center">Them</span><span style="width:60px;text-align:center">Us</span></div>${winRows}<div style="display:flex;gap:1rem;margin-top:.75rem;font-size:11px;color:var(--faint)"><span><span style="color:var(--red)">✓/~</span> = partial or strong</span><span><span style="color:var(--red)">✗</span> = not capable</span><span><span style="color:var(--green)">✓</span> = SAMDesk wins</span></div></div></div><div class="updated">SAMDesk / ADAR — Internal use only · March 2026</div>`;
